<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Havu War Schedule</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1b1f27;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #ff9800;
    color: black;
    padding: 12px;
}

td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #333;
}

tr:hover {
    background: #2a2f36;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">🏰 HAVU WAR SCHEDULE ⚔️</div>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>War Leader</th>
            </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
    </table>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/137WoS-lsagp_0VsshH8uPtZo8fVP9TseUUiuPhqFa-g/gviz/tq?tqx=out:json";

async function loadData() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();

        const json = JSON.parse(text.substring(47).slice(0, -2));
        const rows = json.table.rows;

        const tbody = document.getElementById("scheduleBody");
        tbody.innerHTML = "";

        rows.forEach(r => {
            const date = r.c[0] ? r.c[0].v : "";
            const leader = r.c[1] ? r.c[1].v : "";

            const row = document.createElement("tr");
            row.innerHTML = `<td>${date}</td><td>${leader}</td>`;
            tbody.appendChild(row);
        });

    } catch (err) {
        console.log("Error loading sheet:", err);
    }
}

loadData();
</script>

</body>
</html>
