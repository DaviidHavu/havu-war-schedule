<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Havu War Schedule</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #1c1f26;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #ff9800;
    color: black;
    padding: 12px;
}

td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #333;
}

tr:hover {
    background: #2a2f36;
}

#loginScreen {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="loginScreen">
    <h2>Havu Clan Access</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Enter</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <h1>🏰 HAVU WAR SCHEDULE ⚔️</h1>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>War Leader</th>
            </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
    </table>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/137WoS-lsagp_0VsshH8uPtZo8fVP9TseUUiuPhqFa-g/gviz/tq?tqx=out:json";

async function loadData() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();

        const json = JSON.parse(text.substring(47).slice(0, -2));
        const rows = json.table.rows;

        const tbody = document.getElementById("scheduleBody");
        tbody.innerHTML = "";

        rows.forEach(r => {
            const date = r.c[0] ? r.c[0].v : "";
            const leader = r.c[1] ? r.c[1].v : "";

            const row = document.createElement("tr");
            row.innerHTML = `<td>${date}</td><td>${leader}</td>`;
            tbody.appendChild(row);
        });

    } catch (err) {
        console.log("Error loading sheet", err);
    }
}

function checkPassword() {
    const pass = document.getElementById("passwordInput").value;

    if (pass === "Havuwarlog") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        loadData();
    } else {
        alert("Wrong Password");
    }
}
</script>

</body>
</html>
