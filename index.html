<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Havu War Schedule</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1b1f24;
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#ff9800;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #444;
    text-align:center;
}

tr:hover{
    background:#2a2f36;
}

.password-screen{
    position:fixed;
    inset:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="login" class="password-screen">
    <h2>Havu Management Access</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="checkPassword()">Login</button>
</div>

<div class="container" id="content" style="display:none;">
    <h1>🏰 HAVU WAR SCHEDULE ⚔️</h1>

    <table>
        <thead>
            <tr>
                <th>תאריך</th>
                <th>מנהל מלחמה</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>01/07/2026</td><td>דויד</td></tr>
            <tr><td>02/07/2026</td><td>יוני</td></tr>
            <tr><td>03/07/2026</td><td>עמית</td></tr>
        </tbody>
    </table>
</div>

<script>
function checkPassword(){
    const pass = document.getElementById("password").value;

    if(pass === "HAVU123"){
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
    }else{
        alert("Wrong Password");
    }
}
</script>

</body>
</html>
